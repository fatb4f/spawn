syntax = "proto3";

package spawn.v1;

service SpawnControl {
  rpc Health(HealthRequest) returns (HealthResponse);
  rpc CodexSessionRefresh(CodexSessionRefreshRequest) returns (CodexSessionRefreshResponse);
  rpc CodexSessionStatus(CodexSessionStatusRequest) returns (CodexSessionStatusResponse);
  rpc CodexSessionLogs(CodexSessionLogsRequest) returns (CodexSessionLogsResponse);
  rpc CodexSessionList(CodexSessionListRequest) returns (CodexSessionListResponse);
}

message HealthRequest {}

message HealthResponse {
  bool ok = 1;
  string message = 2;
}

message CodexSessionRefreshRequest {
  string request_id = 1;
  string event_id = 2;
  string refresh_command = 3;
  string log_path = 4;
  bool wait = 5;
}

message CodexSessionRefreshResponse {
  bool ok = 1;
  string request_id = 2;
  string message = 3;
  int32 return_code = 4;
}

message CodexSessionStatusRequest {
  string request_id = 1;
  string log_path = 2;
  double wait_seconds = 3;
}

message CodexSessionStatusResponse {
  bool ok = 1;
  string request_id = 2;
  string row_json = 3;
  string message = 4;
}

message CodexSessionLogsRequest {
  string request_id = 1;
  int32 lines = 2;
  bool follow = 3;
}

message CodexSessionLogsResponse {
  bool ok = 1;
  string request_id = 2;
  string logs = 3;
  int32 return_code = 4;
  string message = 5;
}

message CodexSessionListRequest {
  string log_path = 1;
}

message CodexSessionListResponse {
  bool ok = 1;
  string rows_json = 2;
  string message = 3;
}
